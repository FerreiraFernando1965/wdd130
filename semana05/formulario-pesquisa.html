<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WDD 130 HTML - Enquete Usuário</title>
    <link rel="stylesheet" href="formulario-pesquisa.css">
    <title>Formulário de pesquisa</title>

<body>
    <header>
        <h1>WDD 130 FORMULÁRIO HTML - Enquete Usuário</h1>
        </head>

    </header>
    <main>
        <form action="">
            <label for="nomecompleto">Nome Completo:</label>
            <input type="text" id="nome-completo" name="nome-completo" reqyuired>
            <label for="emaildousuario">E-mail:</label>
            <input type="text" id="email-do-usuaio" name="email-do-usuario" required>
            <label for="navegador">Qual é o seu navegador de internet favorito?</label>
            <select id="navegador" name="navegador">
                <option value="chrome">Chrome</option>
                <option value="firefox">Firefox</option>
                <option value="edge">Edge</option>
                <option value="brave">Brave</option>
                <option value="other">Other</option>
            </select>
            <label for="pet">Você tem um bichinho de estimação?</label>
            <select name="pet" id="pet">
                <option value="Sim">SIM</option>
                <option value="não">Não</option>
            </select>



            <label for="feedback">Liste os lugares onde você morou:</label>
            <textarea id="feedback" name="feedback" rows="4"
                placeholder="Pariquera-Açu Brasil,  Cananéia Brasil, Telemaco Borba Brasil"></textarea>
            </select>

            <button type="submit">ENVIAR</button>
        </form>

    </main>
    <footer>

    </footer>


</body>

</html>
